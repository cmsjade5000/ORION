app = "orion-miniapp-cory-95ce0d"
primary_region = "ord"

[build]
  dockerfile = "app/Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"
  ORION_CORE_DB_PATH = "/data/orion-core.sqlite"
  ORION_CORE_TIMEZONE = "America/New_York"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/readyz"

[[mounts]]
  source = "orion_core_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
