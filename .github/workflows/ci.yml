name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install Dependencies
        run: npm install

      - name: Run CI Gate
        run: make ci

      - name: Run MCP Harness Smoke Test
        run: make mcp-harness-smoke

      - name: Run Skill Guards Smoke Suite
        run: make skill-guards-smoke

      - name: Validate Promptfoo Config
        run: make redteam-validate

      - name: Run Promptfoo Redteam Gate
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make redteam-gate

      - name: Redteam Gate Skipped (Missing Secret)
        if: ${{ secrets.OPENAI_API_KEY == '' }}
        run: 'echo "Skipping redteam-gate: OPENAI_API_KEY secret is not configured for this workflow context."'
