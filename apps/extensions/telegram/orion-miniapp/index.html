<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ORION</title>
    <script>
      function postTelegramNativeEvent(eventType, eventData) {
        try {
          if (window.TelegramWebviewProxy && window.TelegramWebviewProxy.postEvent) {
            window.TelegramWebviewProxy.postEvent(eventType, JSON.stringify(eventData || {}));
            return true;
          }
        } catch (error) {}
        try {
          if (window.external && window.external.notify) {
            window.external.notify(JSON.stringify({ eventType: eventType, eventData: eventData || {} }));
            return true;
          }
        } catch (error) {}
        return false;
      }
      window.__orionSignalTelegramReady = function signalTelegramReady(attemptsLeft) {
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready) {
            window.Telegram.WebApp.ready();
            return;
          }
        } catch (error) {}
        postTelegramNativeEvent("web_app_ready", {});
        if (attemptsLeft > 0) {
          window.setTimeout(function () {
            signalTelegramReady(attemptsLeft - 1);
          }, 100);
        }
      };
      window.__orionSignalTelegramReady(60);
      function reportBootError(kind, detail) {
        try {
          navigator.sendBeacon(
            "/client-error",
            JSON.stringify({
              kind: kind,
              detail: String(detail || "").slice(0, 500),
              userAgent: navigator.userAgent,
              href: window.location.href,
            })
          );
        } catch (error) {}
      }
      window.addEventListener("error", function (event) {
        reportBootError("error", event.message || (event.error && event.error.message));
      });
      window.addEventListener("unhandledrejection", function (event) {
        reportBootError("unhandledrejection", event.reason && (event.reason.message || event.reason));
      });
      if (window.location.protocol === "file:") {
        window.__ORION_FILE_MODE__ = true;
        document.addEventListener("DOMContentLoaded", function () {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<main style="min-height:100vh;display:grid;place-items:center;background:#050914;color:#f5ecd7;font:16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;text-align:center">' +
            '<section style="max-width:420px">' +
            '<h1 style="margin:0 0 12px;font-size:34px">ORION Mini App</h1>' +
            '<p style="line-height:1.5;color:#c9d3e1">This source file will not run from a file link. Open the served app instead.</p>' +
            '<p><a style="color:#f2c36d" href="http://127.0.0.1:8787/">Open local ORION</a></p>' +
            '<p><a style="color:#f2c36d" href="https://mac-mini.tail5e899c.ts.net/">Open Telegram ORION URL</a></p>' +
            '</section></main>';
        });
      }
    </script>
    <script
      async
      src="https://telegram.org/js/telegram-web-app.js?62"
      onload="window.__orionSignalTelegramReady && window.__orionSignalTelegramReady(0)"
      onerror="window.__orionSignalTelegramReady && window.__orionSignalTelegramReady(0)"
    ></script>
    <script type="module" src="./app/main.tsx"></script>
  </head>
  <body>
    <div id="root">
      <main style="min-height:100vh;display:grid;place-items:center;background:#050914;color:#f5ecd7;font:16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;text-align:center">
        <section style="max-width:420px">
          <h1 style="margin:0 0 12px;font-size:34px">ORION</h1>
          <p style="line-height:1.5;color:#c9d3e1">Loading the bridge...</p>
          <p><a style="color:#f2c36d" href="https://mac-mini.tail5e899c.ts.net/">Open ORION directly</a></p>
        </section>
      </main>
    </div>
  </body>
</html>
